version: '3.8'

services:
  backend:
    build: .
    environment:
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: test_db
      DB_HOST: db
      JWT_SECRET: test_secret
    depends_on:
      db:
        condition: service_healthy
    command: npm run test:e2e

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user"]
      interval: 5s
      timeout: 5s
      retries: 5