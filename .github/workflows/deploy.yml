name: Deploy
on:
  workflow_run:
    workflows: ["CI Tests"]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /app/lynch-area
            docker-compose down
            docker-compose pull
            docker-compose up -d
            docker-compose logs -f --tail=100 > deploy_$(date +%s).log